<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTLS Widget | slaxthecollector</title>
    <style>
        html, body {
            background: transparent !important; /* Forces transparent backdrop for TTLS/OBS overlays */
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Widget Box with Asymmetrical Fancy Corners & Subtle Pink Shadow Glow */
        .widget-frame {
            background: rgba(11, 11, 19, 0.92);
            border: 2px solid #fe2c55; /* TikTok Brand Crimson */
            box-shadow: 0 0 25px rgba(254, 44, 85, 0.35);
            
            /* Custom asymmetry shapes */
            border-radius: 40px 10px 40px 10px; 
            
            width: 350px;
            padding: 1.5rem;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .user-header {
            font-size: 1.15rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #25f4ee; /* Vibrant Cyan active tracker light */
            border-radius: 50%;
            box-shadow: 0 0 8px #25f4ee;
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 1.25rem 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .count-number {
            font-size: 3.6rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -1.5px;
            font-variant-numeric: tabular-nums;
        }

        .count-label {
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .loading {
            font-size: 1.6rem !important;
            color: #64748b !important;
            letter-spacing: -0.5px !important;
        }
    </style>
</head>
<body>

    <div class="widget-frame" id="widgetCard">
        <div class="user-header">
            <div class="status-dot" id="statusDot"></div>
            slaxthecollector
        </div>
        
        <div class="counter-box">
            <div class="count-number loading" id="totalFollowers">SYNCING...</div>
            <div class="count-label">Live Followers</div>
        </div>
    </div>

    <script>
        const targetUser = "slaxthecollector";
        const counterEl = document.getElementById('totalFollowers');
        const statusDot = document.getElementById('statusDot');
        const card = document.getElementById('widgetCard');

        async function fetchTikTokStats() {
            try {
                // Directly fetch from a public open CORS endpoint layout bypassing third-party proxies
                const response = await fetch(`https://www.tikwm.com/api/user/info?unique_id=${targetUser}`);
                if (!response.ok) throw new Error("API Route Failure");
                
                const resData = await response.json();
                
                if (resData && resData.data && resData.data.stats) {
                    const realCount = Number(resData.data.stats.followerCount);
                    
                    // Add slight bounce feedback if a real number update happens
                    if (counterEl.innerText !== realCount.toLocaleString() && !counterEl.classList.contains('loading')) {
                        card.style.transform = 'scale(1.05)';
                        setTimeout(() => card.style.transform = 'scale(1)', 150);
                    }

                    counterEl.classList.remove('loading');
                    counterEl.innerText = realCount.toLocaleString();
                    
                    // Reset to active cyan glow colors
                    statusDot.style.background = '#25f4ee';
                    statusDot.style.boxShadow = '0 0 8px #25f4ee';
                } else {
                    throw new Error("Invalid User Payload");
                }
            } catch (err) {
                console.error("Fetch Exception Handled safely: ", err);
                // Turn active marker amber if rate limited or waiting for a fresh push cycle
                statusDot.style.background = '#ffaa00';
                statusDot.style.boxShadow = '0 0 8px #ffaa00';
            }
        }

        // Run instantly upon page boot 
        fetchTikTokStats();

        // Check for updates every 15 seconds to sync changes smoothly without triggering firewalls
        setInterval(fetchTikTokStats, 15000);
    </script>
</body>
</html>
