<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time TTLS Widget | slaxthecollector</title>
    <style>
        html, body {
            background: transparent !important; /* Invisible backdrop for stream overlays */
            margin: 0;
            padding: 0;
            width: 400px;
            height: 300px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .widget-frame {
            background: rgba(11, 11, 19, 0.88);
            border: 2px solid #fe2c55; /* TikTok Brand Red */
            box-shadow: 0 0 20px rgba(254, 44, 85, 0.25);
            border-radius: 40px 10px 40px 10px; /* Fancy Custom Edges */
            width: 350px;
            padding: 1.5rem;
            text-align: center;
            box-sizing: border-box;
        }

        .user-header {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #25f4ee; /* Cyan active dot */
            border-radius: 50%;
            box-shadow: 0 0 8px #25f4ee;
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 1.25rem 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .count-number {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -1.5px;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .count-label {
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        /* Error/Loading text variations */
        .loading {
            font-size: 1.8rem !important;
            color: #94a3b8 !important;
            letter-spacing: 0px !important;
        }
    </style>
</head>
<body>

    <div class="widget-frame">
        <div class="user-header">
            <div class="status-dot" id="statusIndicator"></div>
            slaxthecollector
        </div>
        
        <div class="counter-box">
            <div class="count-number loading" id="totalFollowers">Connecting...</div>
            <div class="count-label" id="labelField">Live Followers</div>
        </div>
    </div>

    <script>
        const username = "slaxthecollector";
        const counterEl = document.getElementById('totalFollowers');
        const statusDot = document.getElementById('statusIndicator');

        // Accesses the livecounts API stream via an open cors wrapper proxy
        async function fetchRealFollowers() {
            try {
                // Step 1: Query the user lookup database
                const searchUrl = `https://tiktok.livecounts.io/user/search/${username}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error();
                
                const wrapperData = await response.json();
                const data = JSON.parse(wrapperData.contents);
                
                if (data && data.users && data.users.length > 0) {
                    // Match exact profile
                    const targetUser = data.users.find(u => u.username.toLowerCase() === username.toLowerCase()) || data.users[0];
                    const userId = targetUser.userId;

                    // Step 2: Fetch real-time specific user stats using parsed ID
                    const statsUrl = `https://tiktok.livecounts.io/user/stats/${userId}`;
                    const statsProxy = `https://api.allorigins.win/get?url=${encodeURIComponent(statsUrl)}`;
                    
                    const statsResponse = await fetch(statsProxy);
                    const statsWrapper = await statsResponse.json();
                    const statsData = JSON.parse(statsWrapper.contents);

                    if (statsData && statsData.followers !== undefined) {
                        // Remove loading styles and display absolute real value
                        counterEl.classList.remove('loading');
                        counterEl.style.color = '#ffffff';
                        counterEl.innerText = Number(statsData.followers).toLocaleString();
                        statusDot.style.background = '#25f4ee';
                        statusDot.style.boxShadow = '0 0 8px #25f4ee';
                    }
                } else {
                    counterEl.innerText = "User Offline";
                    counterEl.classList.add('loading');
                }
            } catch (err) {
                // Graceful fallback if proxy is busy or API limits rate
                console.error("API Fetch Error: ", err);
                statusDot.style.background = '#fe2c55';
                statusDot.style.boxShadow = '0 0 8px #fe2c55';
            }
        }

        // Poll TikTok servers every 10 seconds (keeps it accurate without spamming the proxy server)
        setInterval(fetchRealFollowers, 10000);
        
        // Initial kick-off run
        fetchRealFollowers();
    </script>
</body>
</html>
