<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTLS Hyped Widget | slaxthecollector</title>
    <style>
        html, body {
            background: transparent !important; /* Zero background for clean overlaying */
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Container styling with canvas particle layer positioning */
        .container-wrapper {
            position: relative;
            width: 400px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Particle Overlay Screen layer */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Asymmetric custom styled frames */
        .widget-frame {
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 16, 0.95);
            border: 2px solid #fe2c55;
            box-shadow: 0 0 25px rgba(254, 44, 85, 0.35);
            border-radius: 40px 10px 40px 10px;
            width: 340px;
            padding: 1.5rem;
            text-align: center;
            box-sizing: border-box;
            transform: scale(1);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .user-header {
            font-size: 1.15rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #25f4ee;
            border-radius: 50%;
            box-shadow: 0 0 8px #25f4ee;
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 1.25rem 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .count-number {
            font-size: 3.6rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -1.5px;
            font-variant-numeric: tabular-nums;
            display: inline-block;
            transition: color 0.1s ease;
        }

        .count-label {
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .loading {
            font-size: 1.6rem !important;
            color: #64748b !important;
            letter-spacing: -0.5px !important;
        }

        /* --- Custom Insane Celebration Keyframe Triggers --- */
        .hype-shake {
            animation: hardShake 0.45s cubic-bezier(.36,.07,.19,.97) both;
            border-color: #25f4ee !important;
            box-shadow: 0 0 40px rgba(37, 244, 238, 0.7) !important;
        }

        .hype-text {
            color: #25f4ee !important;
            text-shadow: 0 0 15px #25f4ee, 0 0 30px #fe2c55;
        }

        @keyframes hardShake {
            10%, 90% { transform: translate3d(-2px, 0, 0) scale(1.06); }
            20%, 80% { transform: translate3d(4px, -3px, 0) scale(1.06); }
            30%, 50%, 70% { transform: translate3d(-6px, 4px, 0) scale(1.08); }
            40%, 60% { transform: translate3d(6px, -2px, 0) scale(1.08); }
        }
    </style>
</head>
<body>

    <div class="container-wrapper">
        <!-- Canvas for performance-focused particle splash rendering -->
        <canvas id="particleCanvas"></canvas>

        <div class="widget-frame" id="widgetCard">
            <div class="user-header">
                <div class="status-dot" id="statusDot"></div>
                slaxthecollector
            </div>
            
            <div class="counter-box">
                <div class="count-number loading" id="totalFollowers">INITIALIZING...</div>
                <div class="count-label">Live Followers</div>
            </div>
        </div>
    </div>

    <script>
        const targetUser = "slaxthecollector";
        const counterEl = document.getElementById('totalFollowers');
        const statusDot = document.getElementById('statusDot');
        const card = document.getElementById('widgetCard');
        
        // Canvas Setup
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle Class definition 
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 3;
                // Velocity spreading out violently in a circular ring blast
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = Math.random() > 0.5 ? '#fe2c55' : '#25f4ee';
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // Add subtle gravity pull downwards over time
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Main animation canvas loop execution frame
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Execute the visual celebration impact actions
        function triggerInsaneCelebration() {
            // Screen Shake + Frame glow switch
            card.classList.add('hype-shake');
            counterEl.classList.add('hype-text');

            // Generate explosive particle cluster bursts centered on card bounds
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            for (let i = 0; i < 65; i++) {
                particles.push(new Particle(centerX, centerY));
            }

            // Remove CSS animation triggers completely right on finish timeline
            setTimeout(() => {
                card.classList.remove('hype-shake');
                counterEl.classList.remove('hype-text');
            }, 450);
        }

        // Live API tracking sync implementation logic
        let lastKnownCount = null;

        async function fetchTikTokStats() {
            try {
                const cacheBreaker = `&_=${Date.now()}`;
                const response = await fetch(`https://www.tikwm.com/api/user/info?unique_id=${targetUser}${cacheBreaker}`);
                
                if (!response.ok) throw new Error("Network Issue");
                const resData = await response.json();
                
                if (resData && resData.data && resData.data.stats) {
                    const realCount = Number(resData.data.stats.followerCount);
                    
                    // Tracking milestone change check
                    if (lastKnownCount !== null && realCount > lastKnownCount) {
                        triggerInsaneCelebration();
                    }

                    // Remove initial fallback state properties on boot frame finish
                    if (counterEl.classList.contains('loading')) {
                        counterEl.classList.remove('loading');
                    }

                    lastKnownCount = realCount;
                    counterEl.innerText = realCount.toLocaleString();
                    
                    // Connected Active Status Glow Set
                    statusDot.style.background = '#25f4ee';
                    statusDot.style.boxShadow = '0 0 8px #25f4ee';
                }
            } catch (err) {
                console.error("Auto sync handled: ", err);
                statusDot.style.background = '#ffaa00';
                statusDot.style.boxShadow = '0 0 8px #ffaa00';
            }
        }

        // Start checking 
        fetchTikTokStats();
        setInterval(fetchTikTokStats, 10000); // 10-second request lookup frequency
    </script>
</body>
</html>
