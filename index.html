<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTLS Profile & Goal Tracker</title>
    <style>
        html, body {
            background: transparent !important; /* Zero background for transparent overlaying */
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container-wrapper {
            position: relative;
            width: 420px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Widget Box Layer with Custom Asymmetric Rounded Corners */
        .widget-frame {
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 16, 0.95);
            border: 2px solid #fe2c55; /* TikTok Red Main */
            box-shadow: 0 0 25px rgba(254, 44, 85, 0.3);
            border-radius: 40px 10px 40px 10px;
            width: 360px;
            padding: 1.5rem;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.15s cubic-bezier(.36,.07,.19,.97), border-color 0.2s, box-shadow 0.2s;
        }

        /* Profile Layout Row */
        .profile-row {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 0.75rem;
        }

        .pfp-container {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .pfp-image {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid #25f4ee; /* Cyan Ring Accent */
            background: #14141e;
        }

        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: #25f4ee;
            border-radius: 50%;
            border: 2px solid #0a0a10;
            box-shadow: 0 0 8px #25f4ee;
        }

        .meta-info {
            flex: 1;
            overflow: hidden;
        }

        .display-name {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 800;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .username-handle {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Main Statistics View Panel */
        .counter-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 1rem 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.25rem;
        }

        .count-number {
            font-size: 3.8rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            transition: color 0.1s;
        }

        .count-label {
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        /* Dynamic Visual Progression System */
        .goal-box {
            width: 100%;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .goal-target {
            color: #25f4ee;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-fill {
            height: 100%;
            width: 0%; /* Updates dynamically via JS loop */
            background: linear-gradient(90deg, #fe2c55, #25f4ee);
            border-radius: 20px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(37, 244, 238, 0.4);
        }

        .loading {
            font-size: 1.5rem !important;
            color: #475569 !important;
            letter-spacing: 0px !important;
        }

        /* --- Insane Follow Event CSS Classes --- */
        .hype-shake {
            animation: hardShake 0.45s cubic-bezier(.36,.07,.19,.97) both;
            border-color: #25f4ee !important;
            box-shadow: 0 0 40px rgba(37, 244, 238, 0.6) !important;
        }

        .hype-text {
            color: #25f4ee !important;
            text-shadow: 0 0 15px #25f4ee, 0 0 30px #fe2c55;
        }

        @keyframes hardShake {
            10%, 90% { transform: translate3d(-2px, 1px, 0) scale(1.04); }
            20%, 80% { transform: translate3d(3px, -2px, 0) scale(1.04); }
            30%, 50%, 70% { transform: translate3d(-5px, 3px, 0) scale(1.06); }
            40%, 60% { transform: translate3d(5px, -1px, 0) scale(1.06); }
        }
    </style>
</head>
<body>

    <div class="container-wrapper">
        <canvas id="particleCanvas"></canvas>

        <div class="widget-frame" id="widgetCard">
            <!-- Profile header section components filled dynamically -->
            <div class="profile-row">
                <div class="pfp-container">
                    <img src="" class="pfp-image" id="userPfp" alt="">
                    <div class="status-dot" id="statusDot"></div>
                </div>
                <div class="meta-info">
                    <div class="display-name" id="displayName">Loading Profile...</div>
                    <div class="username-handle">@slaxthecollector</div>
                </div>
            </div>
            
            <div class="counter-box">
                <div class="count-number loading" id="totalFollowers">CONNECTING...</div>
                <div class="count-label">Followers</div>
            </div>

            <!-- Dynamic Progression System -->
            <div class="goal-box">
                <div class="goal-header">
                    <span>Next Goal: <strong class="goal-target" id="goalLabel">1K</strong></span>
                    <span id="percentLabel">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const targetUser = "slaxthecollector";
        const counterEl = document.getElementById('totalFollowers');
        const statusDot = document.getElementById('statusDot');
        const card = document.getElementById('widgetCard');
        const pfpEl = document.getElementById('userPfp');
        const nameEl = document.getElementById('displayName');
        
        const goalLabel = document.getElementById('goalLabel');
        const percentLabel = document.getElementById('percentLabel');
        const progressBar = document.getElementById('progressBar');

        // Canvas Settings
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 3;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 7 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = Math.random() > 0.5 ? '#fe2c55' : '#25f4ee';
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.12;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function triggerInsaneCelebration() {
            card.classList.add('hype-shake');
            counterEl.classList.add('hype-text');

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            for (let i = 0; i < 70; i++) {
                particles.push(new Particle(centerX, centerY));
            }

            setTimeout(() => {
                card.classList.remove('hype-shake');
                counterEl.classList.remove('hype-text');
            }, 450);
        }

        // Automated Goal Progress Scaling Logic
        function updateGoalProgress(currentCount) {
            let currentMilestoneStart = 0;
            let currentMilestoneTarget = 1000;
            let labelText = "1K";

            if (currentCount >= 1000) {
                currentMilestoneStart = 1000;
                currentMilestoneTarget = 1500;
                labelText = "1.5K";
            }
            // Dynamic scaling for future growth milestones above 1.5K
            if (currentCount >= 1500) {
                currentMilestoneStart = 1500;
                currentMilestoneTarget = Math.ceil((currentCount + 1) / 1000) * 1000;
                labelText = (currentMilestoneTarget / 1000) + "K";
            }

            // Calculations
            const range = currentMilestoneTarget - currentMilestoneStart;
            const absoluteProgress = currentCount - currentMilestoneStart;
            let percentage = (absoluteProgress / range) * 100;
            
            if (percentage < 0) percentage = 0;
            if (percentage > 100) percentage = 100;

            // Render updates
            goalLabel.innerText = labelText;
            percentLabel.innerText = `${Math.floor(percentage)}%`;
            progressBar.style.width = `${percentage}%`;
        }

        let lastKnownCount = null;

        async function fetchTikTokStats() {
            try {
                const cacheBreaker = `&_=${Date.now()}`;
                const response = await fetch(`https://www.tikwm.com/api/user/info?unique_id=${targetUser}${cacheBreaker}`);
                
                if (!response.ok) throw new Error("API Connection Error");
                const resData = await response.json();
                
                if (resData && resData.data) {
                    const stats = resData.data.stats;
                    const user = resData.data.user;
                    
                    // Render Profile Assets directly from data payload
                    if (user) {
                        nameEl.innerText = user.nickname || targetUser;
                        if (user.avatarThumb && pfpEl.src !== user.avatarThumb) {
                            pfpEl.src = user.avatarThumb;
                        }
                    }

                    if (stats) {
                        const realCount = Number(stats.followerCount);
                        
                        if (lastKnownCount !== null && realCount > lastKnownCount) {
                            triggerInsaneCelebration();
                        }

                        if (counterEl.classList.contains('loading')) {
                            counterEl.classList.remove('loading');
                        }

                        lastKnownCount = realCount;
                        counterEl.innerText = realCount.toLocaleString();
                        
                        // Handle dynamic bar update 
                        updateGoalProgress(realCount);
                    }

                    // Online state colors
                    statusDot.style.background = '#25f4ee';
                    statusDot.style.boxShadow = '0 0 8px #25f4ee';
                }
            } catch (err) {
                console.error("Tracking routine error: ", err);
                statusDot.style.background = '#ffaa00';
                statusDot.style.boxShadow = '0 0 8px #ffaa00';
            }
        }

        // Initialize Loop
        fetchTikTokStats();
        setInterval(fetchTikTokStats, 10000);
    </script>
</body>
</html>
