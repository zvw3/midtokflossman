<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTLS Widget | slaxthecollector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: transparent !important; /* Forces transparent backdrop for TTLS/OBS */
            overflow: hidden;
            width: 450px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Widget Container with Fancy Corners & Subtle Border Glow */
        .widget-card {
            background: rgba(15, 23, 42, 0.75); /* Dark semi-transparent matte */
            border: 2px solid rgba(254, 44, 85, 0.4); /* TikTok Pink/Red accent border */
            border-radius: 32px 8px 32px 8px; /* Fancy asymmetrical rounded corners */
            padding: 2rem;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(254, 44, 85, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Profile Badge Row */
        .profile-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .avatar-glow {
            width: 42px;
            height: 42px;
            border-radius: 14px; /* Matches the theme */
            background: linear-gradient(45deg, #fe2c55, #25f4ee); /* Classic platform colors */
            padding: 2px;
        }

        .avatar-glow .inner-av {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .user-meta {
            text-align: left;
        }

        .username {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .handle {
            color: #25f4ee; /* Vibrant Cyan */
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Counter */
        .counter-box {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 1rem 0;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .counter {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        /* Subtle dynamic pop effect for stream alerts */
        .pop-animation {
            transform: scale(1.08);
            color: #fe2c55 !important;
        }

        .label {
            color: #94a3b8;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-top: 2px;
        }

        /* Dynamic Goal Bar */
        .goal-container {
            width: 100%;
        }

        .goal-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .goal-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .goal-bar-fill {
            height: 100%;
            width: 74%; /* Changes dynamically via JS */
            background: linear-gradient(90deg, #fe2c55, #ff6b8b);
            border-radius: 10px;
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body>

    <div class="widget-card">
        <div class="profile-row">
            <div class="avatar-glow">
                <div class="inner-av">👑</div>
            </div>
            <div class="user-meta">
                <div class="username">slaxthecollector</div>
                <div class="handle">LIVE TRACKER</div>
            </div>
        </div>

        <div class="counter-box">
            <div class="counter" id="followerCount">10,000</div>
            <div class="label">Followers</div>
        </div>

        <div class="goal-container">
            <div class="goal-text">
                <span>Goal: <strong id="nextGoal">15,000</strong></span>
                <span id="goalPercent">74%</span>
            </div>
            <div class="goal-bar-bg">
                <div class="goal-bar-fill" id="goalBar"></div>
            </div>
        </div>
    </div>

    <script>
        const counterEl = document.getElementById('followerCount');
        const goalBarEl = document.getElementById('goalBar');
        const goalPercentEl = document.getElementById('goalPercent');
        const nextGoalEl = document.getElementById('nextGoal');
        
        // Base starting point
        let currentFollowers = 12450; 

        function updateWidget() {
            // Live simulation logic: random spikes every few seconds
            const chance = Math.random();
            let change = 0;
            
            if (chance > 0.4) change = Math.floor(Math.random() * 3) + 1; // +1 to +3 gain

            if (change > 0) {
                currentFollowers += change;
                
                // Visual Update
                counterEl.innerText = currentFollowers.toLocaleString();
                
                // Dynamic Milestone Target calculation
                const baseMilestone = 5000;
                const prevMilestone = Math.floor(currentFollowers / baseMilestone) * baseMilestone;
                const nextMilestone = prevMilestone + baseMilestone;
                
                nextGoalEl.innerText = nextMilestone.toLocaleString();
                
                // Progress Bar calculation
                const progress = ((currentFollowers - prevMilestone) / baseMilestone) * 100;
                goalBarEl.style.width = `${progress}%`;
                goalPercentEl.innerText = `${Math.floor(progress)}%`;

                // Quick pop/flash color animation for stream engagement
                counterEl.classList.add('pop-animation');
                setTimeout(() => {
                    counterEl.classList.remove('pop-animation');
                }, 250);
            }
        }

        // Variable timing loop to mimic realistic human interactions
        function startLiveLoop() {
            const randomTime = Math.random() * (3500 - 1200) + 1200;
            setTimeout(() => {
                updateWidget();
                startLiveLoop();
            }, randomTime);
        }

        // Init layout
        counterEl.innerText = currentFollowers.toLocaleString();
        updateWidget();
        startLiveLoop();
    </script>
</body>
</html>
