<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TTLS · slaxthecollector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1.25rem;
        }
        .ttls-widget {
            max-width: 480px;
            width: 100%;
            background: rgba(12, 15, 28, 0.20);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border-radius: 48px;
            padding: 2rem 1.75rem;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s ease;
        }
        .widget-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.75rem;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .avatar-frame {
            width: 56px;
            height: 56px;
            border-radius: 40px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,0,0.08);
        }
        .avatar-frame i {
            font-size: 32px;
            color: #f5c842;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .user-info {
            display: flex;
            flex-direction: column;
        }
        .username {
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
            color: #f0f3fa;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .username span {
            background: rgba(255,215,0,0.08);
            padding: 0.1rem 0.6rem;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #f5c842;
            border: 1px solid rgba(255,215,0,0.06);
            text-transform: uppercase;
            backdrop-filter: blur(2px);
        }
        .handle {
            font-size: 0.8rem;
            font-weight: 400;
            color: #9aa3c9;
            letter-spacing: 0.2px;
            margin-top: 0.1rem;
        }
        .ttls-tag {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.02);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.02);
            color: #b7bfe6;
            font-weight: 500;
            letter-spacing: 0.4px;
            backdrop-filter: blur(4px);
        }
        .ttls-tag i {
            margin-right: 6px;
            color: #f5c842;
            font-size: 0.7rem;
        }
        .follower-display {
            background: rgba(8,10,20,0.20);
            backdrop-filter: blur(10px) saturate(160%);
            -webkit-backdrop-filter: blur(10px) saturate(160%);
            border-radius: 40px;
            padding: 1.5rem 1.75rem;
            margin: 1.2rem 0 1.8rem 0;
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: 0 12px 28px -12px rgba(0,0,0,0.3);
        }
        .follower-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            color: #9ca6cf;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .follower-label i {
            color: #f5c842;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .follower-count-wrap {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .follower-number {
            font-weight: 700;
            font-size: 3.4rem;
            line-height: 1;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f6f9ff 0%, #cfd9f5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(245,200,66,0.06);
        }
        .follower-number.loading {
            opacity: 0.5;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        .follower-since {
            font-size: 0.8rem;
            color: #6a74a3;
            background: rgba(255,255,255,0.02);
            padding: 0.25rem 1rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.02);
            font-weight: 500;
            letter-spacing: 0.2px;
            backdrop-filter: blur(2px);
        }
        .follower-since i {
            margin-right: 4px;
            font-size: 0.6rem;
            color: #f5c842;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
        }
        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #a6b0db;
        }
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #44e08a;
            border-radius: 20px;
            box-shadow: 0 0 8px #44e08a80;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(0.95); }
        }
        .refresh-time {
            font-size: 0.7rem;
            color: #5b648b;
            background: rgba(0,0,0,0.15);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.02);
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }
        .refresh-time i {
            margin-right: 6px;
            font-size: 0.6rem;
            color: #8e99c7;
        }
        .widget-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.02);
            padding-top: 1.2rem;
        }
        .refresh-btn {
            background: rgba(245,200,66,0.04);
            border: 1px solid rgba(245,200,66,0.06);
            color: #d6ddf5;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 8px -6px rgba(0,0,0,0.2);
        }
        .refresh-btn:hover {
            background: rgba(245,200,66,0.10);
            border-color: rgba(245,200,66,0.15);
            color: #ffffff;
            box-shadow: 0 6px 14px -6px rgba(0,0,0,0.4);
        }
        .refresh-btn:active {
            transform: scale(0.96);
        }
        .refresh-btn:active i {
            transform: rotate(60deg);
        }
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-message {
            font-size: 0.65rem;
            color: #555f85;
            margin-top: 0.3rem;
            text-align: right;
            letter-spacing: 0.2px;
            opacity: 0.5;
        }
        .error-message {
            color: #ff6b6b;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            text-align: center;
            opacity: 0.8;
            display: none;
        }
        .error-message.visible {
            display: block;
        }
        @media (max-width: 460px) {
            .ttls-widget { padding: 1.5rem 1.25rem; border-radius: 36px; }
            .follower-number { font-size: 2.8rem; }
            .username { font-size: 1.2rem; }
            .follower-display { padding: 1.2rem; }
            .ttls-tag { font-size: 0.6rem; padding: 0.2rem 0.8rem; }
        }
        .ttls-widget, .ttls-widget * { border-radius: 40px; }
        .follower-count-wrap, .status-row, .user-info, .widget-header, .user-badge { border-radius: 0; }
        .avatar-frame, .ttls-tag, .follower-display, .follower-since, .refresh-time, .refresh-btn, .username span { border-radius: 40px; }
        .follower-display { border-radius: 40px; }
        .ttls-widget { border-radius: 48px; }
        .follower-number { border-radius: 0; }
    </style>
</head>
<body>
    <div class="ttls-widget">
        <div class="widget-header">
            <div class="user-badge">
                <div class="avatar-frame"><i class="fab fa-tiktok"></i></div>
                <div class="user-info">
                    <div class="username">slaxthecollector<span>TTLS</span></div>
                    <div class="handle">@slaxthecollector · <i class="fas fa-check-circle" style="color:#f5c842;font-size:0.6rem;"></i> verified</div>
                </div>
            </div>
            <div class="ttls-tag"><i class="fas fa-bolt"></i> WIDGET</div>
        </div>

        <div class="follower-display">
            <div class="follower-label"><i class="fas fa-users"></i> EXACT FOLLOWERS</div>
            <div class="follower-count-wrap">
                <div class="follower-number" id="followerCount">—</div>
                <div class="follower-since"><i class="fas fa-rotate-right"></i> live</div>
            </div>
            <div class="status-row">
                <div class="live-badge"><span class="live-dot"></span> tracking</div>
                <div class="refresh-time"><i class="far fa-clock"></i> <span id="timeDisplay">—</span></div>
            </div>
            <div class="error-message" id="errorMessage"><i class="fas fa-exclamation-circle"></i> <span id="errorText"></span></div>
        </div>

        <div class="widget-footer">
            <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> refresh</button>
        </div>
        <div class="info-message"><i class="fas fa-database"></i> real data via Social Blade API</div>
    </div>

    <script>
        (function() {
            const USERNAME = 'slaxthecollector';
            const followerEl = document.getElementById('followerCount');
            const timeDisplayEl = document.getElementById('timeDisplay');
            const refreshBtn = document.getElementById('refreshBtn');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            let currentCount = null;
            let isFetching = false;

            function formatNumber(num) {
                return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            }

            function updateTime() {
                const now = new Date();
                timeDisplayEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }

            function showError(msg) {
                errorText.textContent = msg;
                errorMsg.classList.add('visible');
                setTimeout(() => errorMsg.classList.remove('visible'), 6000);
            }

            async function fetchTikTokFollowers() {
                if (isFetching) return;
                isFetching = true;
                refreshBtn.disabled = true;
                followerEl.textContent = '⋯';
                followerEl.classList.add('loading');
                errorMsg.classList.remove('visible');

                try {
                    // Social Blade API - Zero Credit Endpoint for TikTok
                    // No API key required for this specific endpoint
                    // Source: https://socialblade.com/developers/docs
                    const url = `https://matrix.sbapis.com/b/tiktok/statistics?query=${USERNAME}`;
                    
                    const response = await fetch(url, {
                        headers: {
                            'Accept': 'application/json',
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    
                    // The Social Blade API returns data in a specific structure
                    // Look for the followers count in the response
                    if (data && data.data && data.data.statistics) {
                        const stats = data.data.statistics;
                        // Try different possible field names
                        let count = stats.followers || stats.followerCount || stats.fans || stats.subscribers;
                        
                        if (count && typeof count === 'number' && count > 0) {
                            currentCount = count;
                            followerEl.textContent = formatNumber(count);
                            updateTime();
                            return;
                        }
                    }

                    // If we didn't find the count in the expected structure, try to find it anywhere
                    const jsonStr = JSON.stringify(data);
                    const match = jsonStr.match(/"followers":(\d+)/i) || 
                                 jsonStr.match(/"followerCount":(\d+)/i) ||
                                 jsonStr.match(/"fans":(\d+)/i);
                    
                    if (match && match[1]) {
                        const count = parseInt(match[1], 10);
                        if (!isNaN(count) && count > 0) {
                            currentCount = count;
                            followerEl.textContent = formatNumber(count);
                            updateTime();
                            return;
                        }
                    }

                    throw new Error('Could not extract follower count from API response');

                } catch (error) {
                    console.error('Error fetching TikTok data:', error);
                    
                    // If we already have a count, keep showing it but mark as stale
                    if (currentCount !== null) {
                        followerEl.textContent = formatNumber(currentCount);
                        showError(`⚠️ Using cached data (${error.message})`);
                    } else {
                        followerEl.textContent = '⚠️';
                        showError(`Failed to fetch: ${error.message}`);
                    }
                } finally {
                    isFetching = false;
                    refreshBtn.disabled = false;
                    followerEl.classList.remove('loading');
                }
            }

            // Initial load
            fetchTikTokFollowers();
            
            // Auto-refresh every 60 seconds
            setInterval(fetchTikTokFollowers, 60000);

            // Manual refresh
            refreshBtn.addEventListener('click', (e) => {
                e.preventDefault();
                fetchTikTokFollowers();
                refreshBtn.blur();
            });

            // Update time every second
            setInterval(updateTime, 1000);
            updateTime();

        })();
    </script>
</body>
</html>
